function calcShouldContact(cad,wk){
  if(!cad)return false;
  if(cad.includes("Weekly for 30")){if(wk<=4)return"Recovery — weekly";if(wk<=12&&wk%2===1)return"Recovery — bi-weekly";return false;}
  if(cad.includes("Immediate call")){if(wk===1)return"Reactivation — immediate";if(wk<=9&&wk%2===0)return"Reactivation — bi-weekly";return false;}
  if(cad.includes("Monthly"))return wk%4===1?"Monthly strategic":false;
  if(cad.includes("Every 6 to 8"))return wk%7===1?"Every 6-8 wks":false;
  if(cad.includes("Every 6"))return wk%6===1?"Every 6 wks":false;
  if(cad.includes("Quarterly"))return wk%13===1?"Quarterly":false;
  if(cad.includes("Semiannual"))return wk%26===1?"Semiannual":false;
  if(cad.includes("Annual"))return wk%52===1?"Annual":false;
  return false;
}
function calcWeekDates(wk){

}

  };

  const tabBtn=(k,l)=><button onClick={()=>setTab(k)} style={{padding:"5px 12px",fontSize:11,fontWeight:500,border:"none",borderRadius:"var(--r)",cursor:"pointer",background:tab===k?"#1B3A6B":"var(--bg2)",color:tab===k?"#fff":"var(--txt2)"}}>{l}</button>;

  return <div style={{display:"flex",gap:0,height:"100%"}}>
    {/* SIDEBAR */}
    <div style={{width:170,flexShrink:0,padding:"0 10px 10px 0",borderRight:"0.5px solid var(--bdr)",display:"flex",flexDirection:"column"}}>
      <div style={{fontSize:10,fontWeight:600,color:"#1B3A6B",textTransform:"uppercase",letterSpacing:".06em",margin:"8px 0 8px"}}>Capacity / week</div>
      {agents.map(ag=>{
        const load=agLoads[ag.name]||0,pct=Math.min(100,Math.round(load/ag.cap*100)),over=load>ag.cap;
        return <div key={ag.name} style={{marginBottom:9}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
            <span style={{fontSize:11,fontWeight:500}}>{ag.name}</span>
            <span style={{fontSize:10,color:over?"#C0392B":"var(--txt2)"}}>{Math.round(load)}<span style={{opacity:.5}}>/{ag.cap}</span>{over?" ⚠":""}</span>
          </div>
          <div style={{height:4,background:"var(--bg2)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:over?"#C0392B":ag.color,borderRadius:2,transition:"width .3s"}}/>
          </div>
          <div style={{fontSize:9,color:"var(--txt3)",marginTop:1}}>{ag.dayStr}</div>
        </div>;
      })}
      <button onClick={()=>setShowAgFm(s=>!s)} style={{fontSize:10,padding:"4px 0",background:"var(--bg2)",border:"0.5px dashed var(--bdr2)",borderRadius:"var(--r)",color:"var(--txt2)",marginBottom:6}}>+ Add agent</button>
      {showAgFm&&<div style={{background:"var(--bg2)",borderRadius:"var(--r)",padding:8,border:"1.5px solid #1B3A6B",marginBottom:6}}>
        {[["Name","name"],["Territory","territory"],["Days/wk","days"],["Contacts/day","cap"],["Schedule","dayStr"]].map(([l,f])=>(
          <div key={f} style={{marginBottom:4}}>
            <div style={{fontSize:9,color:"var(--txt3)",marginBottom:1}}>{l}</div>
            <input value={newAg[f]} onChange={e=>setNewAg(n=>({...n,[f]:e.target.value}))} style={{width:"100%",fontSize:10}}/>
          </div>
        ))}
        <div style={{marginBottom:5}}><div style={{fontSize:9,color:"var(--txt3)",marginBottom:1}}>Color</div>
          <input type="color" value={newAg.color} onChange={e=>setNewAg(n=>({...n,color:e.target.value}))} style={{width:"100%",height:24,padding:0,border:"none",cursor:"pointer"}}/></div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>{if(!newAg.name.trim())return;const n=[...agents,{...newAg,cap:parseInt(newAg.cap)||60}];setAgents(n);persist(null,null,null,n);setNewAg({name:"",color:"#2E6DA4",territory:"",days:5,cap:60,dayStr:"Mon-Fri"});setShowAgFm(false);}} style={{flex:1,background:"#1B3A6B",color:"#fff",border:"none",fontSize:10,fontWeight:600}}>Add</button>
          <button onClick={()=>setShowAgFm(false)} style={{fontSize:10,padding:"3px 6px"}}>✕</button>
        </div>
      </div>}
      <div style={{background:"var(--bg2)",borderRadius:"var(--r)",padding:"7px 10px",marginBottom:8,fontSize:11}}>
        <div style={{color:"var(--txt3)",marginBottom:1}}>Accounts</div>
        <div style={{fontSize:17,fontWeight:500}}>{allAccts.length}</div>
        <div style={{color:"var(--txt3)",marginTop:5,marginBottom:1}}>Open tasks</div>
        <div style={{fontSize:17,fontWeight:500}}>{tasks.filter(t=>!t.done).length}</div>
        <div style={{color:"var(--txt3)",marginTop:5,marginBottom:1}}>Contacts this week</div>
        <div style={{fontSize:17,fontWeight:500}}>{doneThisWk}<span style={{fontSize:11,fontWeight:400,color:"var(--txt3)"}}> / {totalThisWk}</span></div>
      </div>
      {(saved||msg)&&<div style={{fontSize:10,color:msg.startsWith("Error")?"#C0392B":"#1E8449",marginBottom:4,textAlign:"center"}}>{saved?"✓ Saved":msg}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:"auto"}}>
        <button onClick={shareWithTeam} style={{background:"#1B3A6B",color:"#fff",border:"none",fontWeight:700,fontSize:12,padding:"7px 0"}}>📤 Share planner (HTML)</button>
        <button onClick={exportData} style={{fontSize:10,padding:"3px 0",cursor:"pointer"}}>⬇ Export (.json)</button>
        <label style={{textAlign:"center",padding:"4px 0",background:"var(--bg2)",border:"0.5px solid var(--bdr2)",borderRadius:"var(--r)",cursor:"pointer",fontSize:11}}>⬆ Import<input type="file" accept=".json" onChange={importData} style={{display:"none"}}/></label>
        <label style={{textAlign:"center",padding:"4px 0",background:"#E8F4FD",color:"#185FA5",border:"0.5px solid #A8D4F0",borderRadius:"var(--r)",cursor:"pointer",fontSize:11}}>🔀 Merge agent file<input type="file" accept=".json" onChange={mergeFrom} style={{display:"none"}}/></label>
      </div>
      <div style={{fontSize:9,color:"var(--txt3)",marginTop:6,lineHeight:1.4,textAlign:"center"}}>Export → share.<br/>Merge → pull team changes.</div>
    </div>

    {/* MAIN */}
    <div style={{flex:1,minWidth:0,padding:"0 0 0 12px",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{display:"flex",gap:3,marginBottom:10,paddingTop:2,alignItems:"center",justifyContent:"space-between",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
          {[["accounts","Accounts"],["calendar","📅 Calendar"],["tasks","✅ Tasks"],["capacity","📊 Capacity"],["data","📈 Data"],["mergehist","↩ History"]].map(([k,l])=>tabBtn(k,l))}
        </div>
        <span style={{fontSize:10,color:"var(--txt3)"}}>DirectDerm CA Planner</span>
      </div>

      {/* ACCOUNTS TAB */}
      {tab==="accounts"&&<div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minHeight:0,overflow:"hidden"}}>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          <input placeholder="Search clinic, region, type…" value={filter.search} onChange={e=>setF("search",e.target.value)} style={{minWidth:130,flex:1,maxWidth:200}}/>
          <select value={filter.agent} onChange={e=>setF("agent",e.target.value)}>
            <option value="">All agents</option>{agents.map(a=><option key={a.name}>{a.name}</option>)}
          </select>
          <select value={filter.priority} onChange={e=>setF("priority",e.target.value)}>
            <option value="">All priorities</option>{["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}
          </select>
          <select value={filter.trend} onChange={e=>setF("trend",e.target.value)}>
            <option value="">All trends</option>{ALL_TRENDS.map(t=><option key={t}>{t}</option>)}
          </select>
          <button onClick={()=>setShowArc(s=>!s)} style={{background:showArc?"#FADBD8":"var(--bg2)",color:showArc?"#721C24":"var(--txt2)"}}>
            {showArc?"Hide archived":"Show archived"}
          </button>
          <button onClick={()=>setShowAdd(s=>!s)} style={{background:"#1B3A6B",color:"#fff",border:"none",fontWeight:500}}>+ Add provider</button>
          <button onClick={()=>setShowMT(s=>!s)} style={{background:showMT?"#F5A623":"var(--bg2)",color:showMT?"#fff":"var(--txt2)",fontWeight:500}}>🔀 Merge Tool</button>
          {mergeHist.length>0&&<button onClick={()=>setTab("mergehist")} style={{fontSize:11}}>↩ ({mergeHist.length})</button>}
          <span style={{fontSize:10,color:"var(--txt3)"}}>{filtered.length} · ✏ Click to edit</span>
        </div>

        {/* Add Provider */}
        {showAdd&&<div style={{border:"1.5px solid #1B3A6B",borderRadius:"var(--r)",padding:10,background:"var(--bg2)",flexShrink:0}}>
          <div style={{fontSize:12,fontWeight:600,color:"#1B3A6B",marginBottom:7}}>Add New Provider</div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1.5fr",gap:6,marginBottom:6}}>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Clinic name *</div><input value={newProv.c} onChange={e=>setNewProv(n=>({...n,c:e.target.value}))} style={{width:"100%"}}/></div>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Region</div><input value={newProv.r} onChange={e=>setNewProv(n=>({...n,r:e.target.value}))} placeholder="e.g. fresno" style={{width:"100%"}}/></div>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Agent</div><select value={newProv.a} onChange={e=>setNewProv(n=>({...n,a:e.target.value}))} style={{width:"100%"}}>{agNames.map(a=><option key={a}>{a}</option>)}</select></div>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Priority</div><select value={newProv.p} onChange={e=>setNewProv(n=>({...n,p:e.target.value}))} style={{width:"100%"}}>{["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}</select></div>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Cadence</div><select value={newProv.cd} onChange={e=>setNewProv(n=>({...n,cd:e.target.value}))} style={{width:"100%",fontSize:10}}>{ALL_CADENCES.map(c=><option key={c} value={c}>{CADENCE_PW[c]?.label||c}</option>)}</select></div>
          </div>
          <input value={newProv.note} onChange={e=>setNewProv(n=>({...n,note:e.target.value}))} placeholder="Notes: contact, phone, source…" style={{width:"100%",marginBottom:6}}/>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{if(!newProv.c.trim())return;const id=-(Date.now());const n=[...custom,{...newProv,id,isCustom:true}];setCustom(n);persist(null,null,n,null);setNewProv(p=>({...p,c:"",r:"",note:""}));setShowAdd(false);}} style={{background:"#1B3A6B",color:"#fff",border:"none",fontWeight:600,padding:"5px 14px"}}>✓ Add</button>
            <button onClick={()=>setShowAdd(false)}>Cancel</button>
          </div>
        </div>}

        {/* Merge Tool */}
        {showMT&&<div style={{border:"2px solid #F5A623",borderRadius:"var(--r)",padding:10,background:"#FFFDF0",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:600,color:"#92600A"}}>🔀 Merge Tool — search any two accounts</span>
            <button onClick={()=>{setShowMT(false);setMt1(null);setMt2(null);setMts1("");setMts2("");}} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:0}}>×</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 34px 1fr",gap:8,alignItems:"start",marginBottom:8}}>
            {[[1,mt1,mts1,setMts1,mtRes1,"#1E8449","#D5F5E3","✓ Keep (primary)"],[2,mt2,mts2,setMts2,mtRes2,"#C0392B","#FADBD8","Archive (secondary)"]].map(([w,pick,srch,setSrch,res,tc,bg,lbl])=>(
              <div key={w}>
                <div style={{fontSize:10,fontWeight:600,color:tc,marginBottom:4}}>{lbl}</div>
                <input value={srch} onChange={e=>{setSrch(e.target.value);w===1?setMt1(null):setMt2(null);}} placeholder="Type clinic name…" style={{width:"100%",marginBottom:3,border:pick?"1.5px solid "+tc:"0.5px solid var(--bdr2)"}}/>
                {!pick&&res.length>0&&<div style={{border:"0.5px solid var(--bdr2)",borderRadius:"var(--r)",overflow:"hidden",maxHeight:120,overflowY:"auto"}}>
                  {res.map(a=><div key={a.id} onClick={()=>pickMt(w,a)} style={{padding:"4px 8px",cursor:"pointer",fontSize:11,background:"var(--bg)",borderBottom:"0.5px solid var(--bdr)"}} onMouseEnter={e=>e.currentTarget.style.background="var(--bg2)"} onMouseLeave={e=>e.currentTarget.style.background="var(--bg)"}>
                    <strong>{a.c}</strong> <span style={{fontSize:10,color:"var(--txt2)"}}>· {a.r} · {a.a} · {a.v||0}</span>
                  </div>)}
                </div>}
                {pick&&<div style={{background:bg,border:"1px solid "+tc,borderRadius:"var(--r)",padding:"5px 8px",fontSize:11}}>
                  <div style={{fontWeight:500}}>{pick.c}</div>
                  <div style={{fontSize:10,color:"var(--txt2)"}}>{pick.r} · {pick.a} · {pick.v||0} refs</div>
                  <button onClick={()=>{w===1?setMt1(null):setMt2(null);setSrch("");}} style={{marginTop:2,fontSize:9,padding:"1px 5px",background:"rgba(0,0,0,.1)",border:"none",borderRadius:3,cursor:"pointer"}}>Clear</button>
                </div>}
              </div>
            ))}
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",paddingTop:20}}>
              <button onClick={()=>{const t=mt1;setMt1(mt2);setMt2(t);setMts1(mt2?.c||"");setMts2(mt1?.c||"");}} disabled={!mt1||!mt2} style={{background:mt1&&mt2?"#F5A623":"var(--bg2)",color:mt1&&mt2?"#fff":"var(--txt3)",border:"none",borderRadius:"50%",width:28,height:28,fontSize:13,cursor:mt1&&mt2?"pointer":"not-allowed"}}>↔</button>
            </div>
          </div>
          {mt1&&mt2&&<div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1.5fr 1fr",gap:6,background:"#fff",padding:"8px 10px",borderRadius:"var(--r)",border:"1px solid #F5A623",marginBottom:8}}>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Merged name</div><input value={mtN} onChange={e=>setMtN(e.target.value)} style={{width:"100%",fontSize:11}}/></div>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Region</div><input value={mtR} onChange={e=>setMtR(e.target.value)} style={{width:"100%",fontSize:11}}/></div>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Agent</div><select value={mtA} onChange={e=>setMtA(e.target.value)} style={{width:"100%",fontSize:10}}>{agNames.map(o=><option key={o}>{o}</option>)}</select></div>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Cadence</div><select value={mtC} onChange={e=>setMtC(e.target.value)} style={{width:"100%",fontSize:10}}>{ALL_CADENCES.map(o=><option key={o} value={o}>{CADENCE_PW[o]?.label||o}</option>)}</select></div>
            <div><div style={{fontSize:9,color:"var(--txt3)",marginBottom:2}}>Priority</div><select value={mtP} onChange={e=>setMtP(e.target.value)} style={{width:"100%"}}>{["High","Medium","Low"].map(o=><option key={o}>{o}</option>)}</select></div>
          </div>}
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={applyMT} disabled={!mt1||!mt2||!mtN} style={{background:mt1&&mt2&&mtN?"#F5A623":"#ccc",color:"#fff",border:"none",fontWeight:600,padding:"5px 14px",borderRadius:"var(--r)",cursor:mt1&&mt2&&mtN?"pointer":"not-allowed"}}>✓ Confirm merge</button>
            <button onClick={()=>{setShowMT(false);setMt1(null);setMt2(null);setMts1("");setMts2("");}}>Cancel</button>
            <span style={{fontSize:10,color:"var(--txt3)",fontStyle:"italic"}}>Combined refs: {mt1&&mt2?((mt1.v||0)+(mt2.v||0)).toLocaleString():"—"}</span>
          </div>
        </div>}

        {/* Bulk bar */}
        {selIds.size>0&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"#1B3A6B",borderRadius:"var(--r)",flexWrap:"wrap"}}>
          <span style={{fontSize:11,fontWeight:500,color:"#fff"}}>{selIds.size} selected</span>
          <select value={bulkAg} onChange={e=>setBulkAg(e.target.value)} style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"none",fontWeight:500}}>{agNames.map(a=><option key={a} style={{background:"#1B3A6B"}}>{a}</option>)}</select>
          <button onClick={()=>{const up=arr=>arr.map(a=>selIds.has(a.id)?{...a,a:bulkAg}:a);setAccounts(p=>{const n=up(p);persist(n,null,null,null);return n;});setCustom(p=>up(p));setSelIds(new Set());}} style={{background:"#fff",color:"#1B3A6B",border:"none",fontWeight:600,padding:"3px 10px"}}>✓ Reassign</button>
          <button onClick={()=>setSelIds(new Set())} style={{background:"rgba(255,255,255,.15)",color:"#fff",border:"none"}}>Cancel</button>
        </div>}

        {/* Table */}
        <div style={{overflowX:"auto",overflowY:"auto",flex:1,border:"0.5px solid var(--bdr)",borderRadius:"var(--r)"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead style={{position:"sticky",top:0,background:"var(--bg)",zIndex:1}}>
              <tr>
                <th style={{...thS,width:28,cursor:"default"}}><input type="checkbox" checked={pd.length>0&&pd.every(a=>selIds.has(a.id))} onChange={()=>{const all=pd.every(a=>selIds.has(a.id));setSelIds(p=>{const n=new Set(p);pd.forEach(a=>all?n.delete(a.id):n.add(a.id));return n;});}}/></th>
                {[["c","Clinic",160],["a","Agent",80],["r","Region",68],["at","Type",100],["p","Priority",68],["cd","Cadence",100],["t","Trend",108],["v","24Mo",52],["vh","Hist",48],["rec_pct","Rec%",50],["opp_annual","Opp/yr",55],["yoy","YoY",44],["status","Status",88]].map(([col,h,w])=>(
                  <th key={col} style={{...thS,minWidth:w}} onClick={()=>setSort(s=>({col,dir:s.col===col?-s.dir:-1}))}>
                    {h}{sort.col===col?(sort.dir>0?" ↑":" ↓"):""}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {pd.map((a,i)=>{
                const tc=TREND_CLR[a.t]||{bg:"#F2F2F2",txt:"#555"};
                const pc=PRI_CLR[a.p]||{bg:"#F2F2F2",txt:"#555"};
                const agClr=agCfg[a.a]?.color||"#888";
                const isNeg=(a.yoy||"").startsWith("-");
                const isSel=selIds.has(a.id);
                const isArc=a.status&&a.status!=="Active";
                const pct=Math.min(100,a.rec_pct||0);
                return <tr key={a.id} style={{background:isSel?"#EEF4FF":isArc?"var(--bg2)":i%2===0?"transparent":"var(--bg2)",opacity:isArc?.55:1,outline:isSel?"1px solid #2E6DA4":"none",outlineOffset:"-1px"}}>
                  <td style={{...tdS,width:28,textAlign:"center"}}><input type="checkbox" checked={isSel} onChange={()=>setSelIds(p=>{const n=new Set(p);n.has(a.id)?n.delete(a.id):n.add(a.id);return n;})}/></td>
                  <td style={{...tdS,maxWidth:185,fontWeight:500}}>
                    <EC value={a.c} onSave={v=>updAcc(a.id,"c",v)}/>
                    {a.isCustom&&<span style={{fontSize:9,background:"#1B3A6B",color:"#fff",borderRadius:3,padding:"1px 4px",fontWeight:600,marginLeft:2}}>NEW</span>}
                    {a.note&&<div style={{fontSize:9,color:"var(--txt3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:185}}>{a.note}</div>}
                  </td>
                  <td style={tdS}><select value={a.a} onChange={e=>updAcc(a.id,"a",e.target.value)} style={{color:agClr,fontWeight:500,maxWidth:85}}>{agNames.map(ag=><option key={ag}>{ag}</option>)}</select></td>
                  <td style={{...tdS,maxWidth:70}}><EC value={a.r||""} onSave={v=>updAcc(a.id,"r",v)}/></td>
                  <td style={{...tdS,maxWidth:100}}><EC value={a.at||""} onSave={v=>updAcc(a.id,"at",v)} tag="select" options={ALL_TYPES}/></td>
                  <td style={tdS}><select value={a.p} onChange={e=>updAcc(a.id,"p",e.target.value)} style={{background:pc.bg,color:pc.txt,fontWeight:500}}>{["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}</select></td>
                  <td style={tdS}><select value={a.cd} onChange={e=>updAcc(a.id,"cd",e.target.value)} style={{maxWidth:98,fontSize:10}}>{ALL_CADENCES.map(c=><option key={c} value={c}>{CADENCE_PW[c]?.label||c}</option>)}</select></td>
                  <td style={tdS}><Bdg l={a.t} bg={tc.bg} txt={tc.txt}/></td>
                  <td style={{...tdS,textAlign:"right",fontWeight:500}}>{(a.v||0).toLocaleString()}</td>
                  <td style={{...tdS,textAlign:"right",fontSize:10,color:"var(--txt3)"}}>{(a.vh||0).toLocaleString()}</td>
                  <td style={{...tdS,padding:"5px 4px"}}>
                    {a.peak_avg>0?<div>
                      <div style={{height:4,background:"var(--bg2)",borderRadius:2,overflow:"hidden",marginBottom:1}}>
                        <div style={{height:"100%",width:pct+"%",background:pct>=80?"#1E8449":pct>=50?"#52BE80":pct>=25?"#F39C12":"#C0392B",borderRadius:2}}/>
                      </div>
                      <div style={{fontSize:9,textAlign:"center",color:pct>=80?"#1E8449":pct>=25?"#856404":"#C0392B",fontWeight:500}}>{pct.toFixed(0)}%</div>
                    </div>:<span style={{fontSize:9,color:"var(--txt3)"}}>—</span>}
                  </td>
                  <td style={{...tdS,textAlign:"right",fontSize:10}}>{(a.opp_annual||0)>0?<span style={{fontWeight:500,color:"#1B3A6B"}}>{(a.opp_annual||0).toLocaleString()}</span>:<span style={{color:"var(--txt3)"}}>—</span>}</td>
                  <td style={{...tdS,fontWeight:500,color:isNeg?"#C0392B":"#1E8449"}}>{a.yoy||"—"}</td>
                  <td style={tdS}><select value={a.status||"Active"} onChange={e=>updStatus(a.id,e.target.value)} style={{fontSize:10,maxWidth:88}}>{["Active","Closed — Permanently","Name Changed","Merged with Other","Inactive — Do Not Contact"].map(s=><option key={s}>{s}</option>)}</select></td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:12,fontSize:11,color:"var(--txt2)"}}>
          <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0} style={{opacity:page===0?.4:1}}>← Prev</button>
          <span>Page {page+1} of {Math.max(1,pages)}</span>
          <button onClick={()=>setPage(p=>Math.min(pages-1,p+1))} disabled={page>=pages-1} style={{opacity:page>=pages-1?.4:1}}>Next →</button>
        </div>
      </div>}

      {/* CALENDAR TAB */}
      {tab==="calendar"&&<div style={{display:"flex",flexDirection:"column",gap:0,flex:1,minHeight:0,overflow:"hidden"}}>

                      <td style={{padding:"4px 8px",fontSize:10,fontWeight:500,color:agCfg[a.a]?.color||"#888"}}>{a.a}</td>
                      <td style={{padding:"4px 8px",textAlign:"center"}}><strong>{(a.peak_avg||0).toFixed(1)}</strong></td>

                        <div style={{height:4,background:"var(--bg2)",borderRadius:2,overflow:"hidden",marginBottom:1}}><div style={{height:"100%",width:pct+"%",background:pct>=80?"#1E8449":pct>=50?"#52BE80":pct>=25?"#F39C12":"#C0392B",borderRadius:2}}/></div>

                {dTab==="referrals"&&<div style={{overflowY:"auto",flex:1}}>

            <div style={{fontSize:11,color:"var(--txt2)",marginBottom:8}}>CSV or Excel with clinic name and referral count columns. Compares to baseline 24Mo data.</div>
            <label style={{display:"inline-block",padding:"5px 14px",background:"#1B3A6B",color:"#fff",borderRadius:"var(--r)",cursor:"pointer",fontSize:11,fontWeight:500}}>📂 Upload (.csv or .xlsx)
              <input type="file" accept=".csv,.xlsx,.xls" onChange={e=>{const file=e.target.files[0];if(!file)return;const proc=rows=>{const m=rows.map(r=>{const cl=(r.clinic||"").toLowerCase().trim();const found=allAccts.find(a=>a.c.toLowerCase().includes(cl.slice(0,12))||cl.includes(a.c.toLowerCase().slice(0,12)));return{clinic:r.clinic,newRefs:parseInt(r.value)||0,prevRefs:found?.v??null,agent:found?.a||"—"};}).filter(r=>r.clinic).sort((a,b)=>b.newRefs-a.newRefs);setRefUp({rows:m,filename:file.name});};if(file.name.endsWith(".csv")){window.Papa.parse(file,{header:true,skipEmptyLines:true,complete:res=>{const cols=res.meta.fields||[];const cC=cols.find(c=>/clinic|provider|account|name/i.test(c));const vC=cols.find(c=>/ref|count|volume/i.test(c));if(!cC||!vC){alert("Cannot detect columns.");return;}proc(res.data.map(r=>({clinic:r[cC],value:r[vC]})));}})}else{const rd=new FileReader();rd.onload=ev=>{const wb=window.XLSX.read(ev.target.result,{type:"binary"});const data=window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);const cols=Object.keys(data[0]||{});const cC=cols.find(c=>/clinic|provider|account|name/i.test(c));const vC=cols.find(c=>/ref|count|volume/i.test(c));if(!cC||!vC){alert("Cannot detect columns.");return;}proc(data.map(r=>({clinic:r[cC],value:r[vC]})));};rd.readAsBinaryString(file);}e.target.value="";}} style={{display:"none"}}/>
            </label>
            {refUp&&<span style={{marginLeft:10,fontSize:11,color:"#1E8449"}}>✓ {refUp.filename} — {refUp.rows.length} rows</span>}
          </div>
          {refUp&&<div style={{border:"0.5px solid var(--bdr)",borderRadius:"var(--r)",overflow:"hidden"}}>
            <div style={{background:"#1B3A6B",padding:"5px 10px"}}><span style={{fontSize:12,fontWeight:500,color:"#fff"}}>Comparison: {refUp.filename} vs baseline</span></div>
            <div style={{overflowX:"auto",maxHeight:400,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead style={{position:"sticky",top:0,background:"var(--bg)"}}>
                  <tr>{["Clinic","Agent","Baseline 24Mo","New Period","Change","Status"].map(h=><th key={h} style={{...thS,cursor:"default"}}>{h}</th>)}</tr>
                </thead>
                <tbody>{refUp.rows.map((r,i)=>{const chg=r.prevRefs!==null?r.newRefs-r.prevRefs:null;const isUp=chg>0,isDown=chg<0;return <tr key={i} style={{background:i%2===0?"transparent":"var(--bg2)"}}>
                  <td style={{padding:"4px 8px",fontWeight:500,maxWidth:180}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.clinic}</div></td>
                  <td style={{padding:"4px 8px",fontSize:10,fontWeight:500,color:agCfg[r.agent]?.color||"#888"}}>{r.agent}</td>
                  <td style={{padding:"4px 8px",textAlign:"right"}}>{r.prevRefs!==null?r.prevRefs.toLocaleString():"—"}</td>
                  <td style={{padding:"4px 8px",textAlign:"right",fontWeight:500}}>{r.newRefs.toLocaleString()}</td>
                  <td style={{padding:"4px 8px",textAlign:"right",fontWeight:500,color:isUp?"#1E8449":isDown?"#C0392B":"var(--txt2)"}}>{chg!==null?(chg>0?"+":"")+chg:"—"}</td>
                  <td style={{padding:"4px 8px"}}>{r.prevRefs===null?<Bdg l="Unmatched" bg="#FFF3CD" txt="#856404"/>:isUp?<Bdg l="↑ Up" bg="#D5F5E3" txt="#1E8449"/>:isDown?<Bdg l="↓ Down" bg="#FADBD8" txt="#C0392B"/>:<Bdg l="= Flat" bg="var(--bg2)" txt="var(--txt3)"/>}</td>
                </tr>;})}
                </tbody>
              </table>
            </div>
          </div>}
          {!refUp&&<div style={{textAlign:"center",padding:40,color:"var(--txt3)",fontSize:12}}>Upload a referral file above to compare against baseline.</div>}
        </div>}
        {dTab==="salesforce"&&<div style={{overflowY:"auto",flex:1}}>
          <div style={{background:"var(--bg2)",borderRadius:"var(--r)",padding:"10px 12px",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:500,marginBottom:3}}>Upload Salesforce activity report (CSV)</div>
            <div style={{fontSize:11,color:"var(--txt2)",marginBottom:8}}>Required: agent/owner column. Shows activities logged vs expected cadence per agent.</div>
            <label style={{display:"inline-block",padding:"5px 14px",background:"#1B3A6B",color:"#fff",borderRadius:"var(--r)",cursor:"pointer",fontSize:11,fontWeight:500}}>📂 Upload CSV
              <input type="file" accept=".csv" onChange={e=>{const file=e.target.files[0];if(!file)return;window.Papa.parse(file,{header:true,skipEmptyLines:true,complete:res=>{const cols=res.meta.fields||[];const acC=cols.find(c=>/account|clinic|related|name/i.test(c));const agC=cols.find(c=>/owner|agent|assigned|rep|user/i.test(c));const dtC=cols.find(c=>/date/i.test(c));const tyC=cols.find(c=>/type|subject/i.test(c));const stC=cols.find(c=>/status/i.test(c));if(!agC){alert("Cannot find Agent/Owner column.");return;}const rows=res.data.map(r=>({clinic:acC?r[acC]:"—",agent:r[agC]||"—",date:dtC?r[dtC]:"—",type:tyC?r[tyC]:"—",status:stC?r[stC]:"—"}));const byAg={};agents.forEach(ag=>{const key=Object.keys(rows.reduce((a,r)=>(a[r.agent]=1,a),{})).find(k=>k.toLowerCase().includes(ag.name.toLowerCase())||ag.name.toLowerCase().includes(k.toLowerCase().split(" ")[0]));byAg[ag.name]=rows.filter(r=>r.agent===key);});const expPW={};agents.forEach(ag=>{expPW[ag.name]=Math.round(allAccts.filter(a=>a.a===ag.name&&(!a.status||a.status==="Active")).reduce((s,a)=>s+(CADENCE_PW[a.cd]?.pw||0),0));});setSfUp({byAg,expPW,filename:file.name,total:rows.length,rows});}});e.target.value="";}} style={{display:"none"}}/>
            </label>
            {sfUp&&<span style={{marginLeft:10,fontSize:11,color:"#1E8449"}}>✓ {sfUp.filename} — {sfUp.total} activities</span>}
          </div>
          {sfUp&&<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8,marginBottom:10}}>
              {agents.map(ag=>{const acts=sfUp.byAg[ag.name]||[];const exp=sfUp.expPW[ag.name]||0;const pct=exp>0?Math.round(acts.length/exp*100):100;const done=acts.filter(a=>/complet|done|closed/i.test(a.status||"")).length;const [bg,tc]=pct>=90?["#D5F5E3","#1E8449"]:pct>=70?["#FFF3CD","#856404"]:["#FADBD8","#C0392B"];
                return <div key={ag.name} style={{border:"0.5px solid var(--bdr)",borderRadius:"var(--r)",overflow:"hidden"}}>
                  <div style={{background:ag.color,padding:"4px 8px"}}><span style={{fontSize:12,fontWeight:500,color:"#fff"}}>{ag.name}</span></div>
                  <div style={{padding:"8px 10px",background:bg}}>
                    <div style={{fontSize:20,fontWeight:600,color:tc}}>{pct}%</div>
                    <div style={{fontSize:10,color:"var(--txt2)"}}>{acts.length} logged / {exp} expected<br/>{done} completed</div>
                  </div>
                </div>;
              })}
            </div>
            {(()=>{const contacted=new Set(agents.flatMap(ag=>(sfUp.byAg[ag.name]||[]).map(a=>a.clinic.toLowerCase().trim())));const missing=allAccts.filter(a=>{if(a.status&&a.status!=="Active")return false;const pw=CADENCE_PW[a.cd]?.pw||0;if(pw<0.1||a.p==="Low")return false;return!contacted.has(a.c.toLowerCase().trim());});
              return missing.length?<div style={{border:"1.5px solid #FADBD8",borderRadius:"var(--r)",overflow:"hidden"}}>
                <div style={{background:"#C0392B",padding:"5px 10px"}}><span style={{fontSize:12,fontWeight:500,color:"#fff"}}>⚠ High/Medium accounts with no activity ({missing.length})</span></div>
                <div style={{maxHeight:200,overflowY:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr>{["Clinic","Agent","Priority","Cadence"].map(h=><th key={h} style={{...thS,cursor:"default"}}>{h}</th>)}</tr></thead>
                  <tbody>{missing.slice(0,30).map((a,i)=><tr key={a.id} style={{background:i%2===0?"#FFF8F8":"var(--bg2)"}}>
                    <td style={{padding:"3px 8px",fontWeight:500}}>{a.c}</td>
                    <td style={{padding:"3px 8px",fontSize:10,fontWeight:500,color:agCfg[a.a]?.color||"#888"}}>{a.a}</td>
                    <td style={{padding:"3px 8px"}}><Bdg l={a.p} bg={PRI_CLR[a.p]?.bg||"#eee"} txt={PRI_CLR[a.p]?.txt||"#555"}/></td>
                    <td style={{padding:"3px 8px",fontSize:10,color:"var(--txt2)"}}>{CADENCE_PW[a.cd]?.label||a.cd}</td>
                  </tr>)}{missing.length>30&&<tr><td colSpan="4" style={{padding:"3px 8px",fontSize:10,color:"var(--txt3)"}}>+{missing.length-30} more</td></tr>}</tbody>
                </table></div>
              </div>:null;
            })()}
          </>}
          {!sfUp&&<div style={{textAlign:"center",padding:40,color:"var(--txt3)",fontSize:12}}>Upload a Salesforce CSV to track outreach adherence.</div>}
        </div>}
      </div>}

      {/* MERGE HISTORY TAB */}
      {tab==="mergehist"&&<div style={{display:"flex",flexDirection:"column",gap:8,overflowY:"auto",flex:1}}>
        <div style={{fontSize:12,color:"var(--txt2)"}}>All merges recorded. Click Undo to restore both accounts exactly as they were.</div>
        {mergeHist.length===0&&<div style={{textAlign:"center",padding:40,color:"var(--txt3)",fontSize:12}}>No merges yet.</div>}
        {mergeHist.map((e,i)=>(
          <div key={e.id} style={{border:"0.5px solid var(--bdr)",borderRadius:"var(--r)",padding:"10px 12px",background:i===0?"#FFFDF0":"var(--bg)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <span style={{fontSize:11,fontWeight:600}}>{e.primaryLabel}</span>
              <span style={{fontSize:10,color:"var(--txt3)"}}>{e.mergedAt}</span>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
              <Bdg l={e.primaryLabel} bg="#D5F5E3" txt="#1E8449" sz={11}/>
              <span style={{fontSize:10,color:"var(--txt3)"}}>merged from</span>
              <Bdg l={e.secondaryLabel} bg="#FADBD8" txt="#C0392B" sz={11}/>
            </div>
            <button onClick={()=>undoMerge(e)} style={{background:"#1B3A6B",color:"#fff",border:"none",borderRadius:"var(--r)",padding:"4px 14px",fontSize:11,fontWeight:600,cursor:"pointer"}}>↩ Undo — restore both accounts</button>
          </div>
        ))}
      </div>}
    </div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script></body></html>
